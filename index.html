<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voloo ! | Live SMC Signals</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        #signals-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .signal-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .signal-card:hover {
            transform: translateY(-5px);
        }

        .symbol {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .type {
            background: rgba(0, 255, 136, 0.2);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            margin: 20px 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .price-box label {
            display: block;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .price-box span {
            font-weight: bold;
            color: #fff;
        }

        .description {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
            font-style: italic;
        }

        .time {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #64748b;
            display: block;
            text-align: right;
        }

        .loader {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Voloo !</h1>
        <p>Advanced SMC Crypto Scanner</p>
        <div class="status-bar">● Live Market Analysis Active</div>
    </header>

    <div id="signals-container">
        <div class="loader">🔍 Searching for high-probability signals...</div>
    </div>

    <script>
        // --- මෙතනට ඔයාගේ FIREBASE CONFIG එක දාන්න ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "trade-56a15.firebaseapp.com",
            projectId: "trade-56a15",
            storageBucket: "trade-56a15.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Listen for Signals
        db.collection("signals").orderBy("time", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById("signals-container");
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="loader">No signals detected yet. Scanning market...</div>';
                return;
            }

            container.innerHTML = ""; // Clear loader

            snapshot.forEach((doc) => {
                const data = doc.data();
                const timeStr = data.time ? new Date(data.time.toDate()).toLocaleString() : "Just now";

                const card = `
                    <div class="signal-card">
                        <div class="symbol">
                            ${data.symbol}
                            <span class="type">${data.type}</span>
                        </div>
                        
                        <div class="price-grid">
                            <div class="price-box">
                                <label>ENTRY</label>
                                <span>${data.entry}</span>
                            </div>
                            <div class="price-box">
                                <label style="color: #00ff88;">TARGET</label>
                                <span>${data.tp}</span>
                            </div>
                            <div class="price-box">
                                <label style="color: #ff4d4d;">STOP</label>
                                <span>${data.sl}</span>
                            </div>
                        </div>

                        <div class="description">
                            ${data.description}
                        </div>
                        
                        <span class="time">Last Update: ${timeStr}</span>
                    </div>
                `;
                container.innerHTML += card;
            });
        });
    </script>
</body>
</html>
